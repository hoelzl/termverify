default_language_version:
  python: python3.12

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv --no-config run ruff check .
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff format check
        entry: uv --no-config run ruff format --check .
        language: system
        pass_filenames: false

      - id: validate-knowledge-frontmatter
        name: validate knowledge frontmatter
        entry: uv --no-config run python scripts/validate_knowledge_frontmatter.py
        language: system
        pass_filenames: false

      - id: validate-evidence-governance
        name: validate evidence governance
        entry: uv --no-config run python scripts/validate_evidence_governance.py
        language: system
        pass_filenames: false

      - id: type-check
        name: type check
        entry: uv --no-config run mypy src tests scripts
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: build-distributions
        name: build distributions
        entry: uv --no-config build
        language: system
        pass_filenames: false
        stages: [pre-push]

      # The test suite runs last within pre-push: it takes minutes while the
      # type check and the build take seconds, and a trivially fixable failure
      # in a cheap check should abort the push in seconds, not after the full
      # suite (issue #168).
      - id: test
        name: test suite
        entry: uv --no-config run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
