# Documentation site for termverify.dev. The docs_dir is a generated staging
# tree assembled by scripts/build_site.py from committed content only
# (README.md as the landing page plus docs/knowledge/ and
# docs/developer-guide/); docs/agent/ is never staged. The /schemas/ prefix
# is reserved for the canonical schema mirror and is guarded fail-closed by
# the site builder. This build runs only in the Pages deploy workflow and on
# demand locally; it is not part of the required validation gate.

site_name: TermVerify
site_url: https://termverify.dev/
site_description: >-
  Protocol-driven verification for autonomous terminal applications:
  deterministic transcripts, replayable evidence, and human review.
repo_url: https://github.com/hoelzl/termverify
repo_name: hoelzl/termverify
docs_dir: .site-docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
